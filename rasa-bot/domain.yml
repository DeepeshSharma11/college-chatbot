version: "3.1"

intents:
  - greet
  - ask_admission
  - ask_fees
  - ask_courses
  - ask_placement
  - ask_scholarship
  - ask_hostel
  - ask_library
  - goodbye

responses:
  utter_greet:
    - text: "Hello! Welcome to College Chatbot. How can I help you today?"
    - text: "Hi there! Ask me anything about our college."

  utter_admission:
    - text: "Admissions are open for 2024! Last date to apply is June 30th. You can apply online through our website."
    - text: "The admission process starts in May. You need to fill the online application form and appear for the entrance exam."

  utter_fees:
    - text: "Fee structure: B.Tech - ₹1.5 Lakhs/year, BCA - ₹80,000/year, MBA - ₹2 Lakhs/year, MCA - ₹1.2 Lakhs/year"
    - text: "Fees can be paid semester-wise. Scholarships are available for meritorious students."

  utter_courses:
    - text: "We offer B.Tech in CS, IT, ECE, Mechanical, Civil; BCA; MBA; MCA; and B.Sc in various streams."
    - text: "Popular courses include B.Tech Computer Science, BCA, and MBA. Which course interests you?"

  utter_placement:
    - text: "Our placement record is excellent! 85% of students get placed. Top recruiters include Google, Microsoft, Amazon, and Infosys."
    - text: "Average package is 6 LPA and highest package goes up to 25 LPA."

  utter_scholarship:
    - text: "We offer merit-based scholarships. Students with >85% in 12th get 50% fee waiver."
    - text: "Need-based scholarships are also available. Contact the scholarship office for details."

  utter_hostel:
    - text: "Separate hostels for boys and girls. Fees: ₹60,000 per year including mess. AC rooms available at extra cost."
    - text: "Hostel facilities include Wi-Fi, gym, common room, and 24/7 security."

  utter_library:
    - text: "Central library has 50,000+ books, digital resources, and study rooms. Open 8 AM to 8 PM."
    - text: "You can borrow up to 5 books for 15 days. Online access to journals and e-books available."

  utter_goodbye:
    - text: "Thank you for chatting! Feel free to come back if you have more questions."
    - text: "Goodbye! Have a great day!"

  utter_default:
    - text: "Sorry, I didn't understand that. Please ask about admissions, courses, fees, placements, or hostel facilities."
    - text: "I'm here to help with college-related queries. Could you rephrase your question?"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true